<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ניהול תזרים ושכר</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f7f7f5; --surface: #ffffff; --border: #e4e4e0;
    --text: #1a1a18; --muted: #888780;
    --green: #0F6E56; --green-bg: #E1F5EE;
    --red: #993C1D; --red-bg: #FAECE7;
    --blue: #185FA5; --blue-bg: #E6F1FB;
    --amber: #854F0B; --amber-bg: #FAEEDA;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; min-height: 100vh; }

  #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 380px; }
  .auth-card h1 { font-size: 22px; font-weight: 600; margin-bottom: 0.25rem; }
  .auth-card p { color: var(--muted); font-size: 14px; margin-bottom: 1.5rem; }
  .auth-tabs { display: flex; margin-bottom: 1.5rem; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .auth-tab { flex: 1; padding: 8px; background: transparent; border: none; cursor: pointer; font-size: 14px; color: var(--muted); }
  .auth-tab.active { background: var(--text); color: #fff; font-weight: 500; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .field input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg); color: var(--text); }
  .btn-primary { width: 100%; padding: 11px; background: var(--text); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; }
  .btn-primary:disabled { opacity: 0.5; }
  .msg { margin-top: 12px; padding: 10px 12px; border-radius: var(--radius-sm); font-size: 13px; display: none; }
  .msg.ok { background: var(--green-bg); color: var(--green); display: block; }
  .msg.err { background: var(--red-bg); color: var(--red); display: block; }

  #app-screen { display: none; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-size: 16px; font-weight: 600; }
  .topbar-user { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
  .btn-logout { padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; cursor: pointer; font-size: 13px; color: var(--muted); }
  .main { max-width: 800px; margin: 0 auto; padding: 1.25rem 1rem 5rem; }
  .month-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
  .month-bar label { font-size: 13px; color: var(--muted); }
  .month-bar select { padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 14px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .card-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .card-value { font-size: 22px; font-weight: 600; }
  .c-green { color: var(--green); } .c-red { color: var(--red); } .c-blue { color: var(--blue); }
  .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .tab { padding: 8px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; font-size: 13px; color: var(--muted); }
  .tab.active { background: var(--text); color: #fff; border-color: var(--text); font-weight: 500; }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .section-title { font-size: 14px; font-weight: 600; margin-bottom: 1rem; }
  .page { display: none; } .page.active { display: block; }
  .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-bottom: 10px; }
  .form-row input, .form-row select { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 13px; width: 100%; }
  .btn-add { padding: 8px 16px; border: none; border-radius: var(--radius-sm); background: var(--text); color: #fff; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-add:disabled { opacity: 0.5; }
  .btn-sm { padding: 5px 10px; border: none; border-radius: var(--radius-sm); background: var(--text); color: #fff; cursor: pointer; font-size: 12px; }
  .btn-outline { padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text); cursor: pointer; font-size: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: right; color: var(--muted); font-weight: 400; padding: 6px 0; border-bottom: 1px solid var(--border); }
  td { padding: 9px 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .empty { text-align: center; color: var(--muted); padding: 20px; font-size: 13px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 500; }
  .badge-income { background: var(--green-bg); color: var(--green); }
  .badge-expense { background: var(--red-bg); color: var(--red); }
  .badge-paid { background: var(--green-bg); color: var(--green); }
  .badge-pending { background: var(--amber-bg); color: var(--amber); }
  .badge-late { background: var(--red-bg); color: var(--red); }
  .btn-del { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 2px 6px; border-radius: 4px; }
  .btn-del:hover { color: var(--red); background: var(--red-bg); }
  .bar-wrap { margin-bottom: 10px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 3px; }
  .bar-bg { height: 8px; background: var(--bg); border-radius: 100px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 100px; }
  .alert { padding: 12px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 8px; }
  .alert-ok { background: var(--green-bg); color: var(--green); }
  .alert-warn { background: var(--amber-bg); color: var(--amber); }
  .alert-danger { background: var(--red-bg); color: var(--red); }
  select.status-select { padding: 4px 8px; font-size: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); }

  /* עובדים */
  .emp-cards { display: flex; flex-direction: column; gap: 12px; }
  .emp-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .emp-card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--bg); border-bottom: 1px solid var(--border); cursor: pointer; }
  .emp-card-name { font-weight: 600; font-size: 15px; }
  .emp-card-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .emp-card-body { padding: 12px 16px; }
  .emp-card-body.collapsed { display: none; }
  .event-form { background: var(--bg); border-radius: var(--radius-sm); padding: 10px; margin-bottom: 10px; }
  .event-form-title { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }

  /* לקוחות */
  .client-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .client-card-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: var(--bg); }
  .client-card-header:hover { opacity: 0.9; }
  .client-card-body { padding: 12px 16px; border-top: 1px solid var(--border); display: none; }
  .client-card-body.open { display: block; }
  .client-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; font-size: 13px; }
  .client-info-item label { color: var(--muted); font-size: 11px; display: block; }

  /* אירועים */
  .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .event-card-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .event-card-header:hover { background: var(--bg); }
  .event-card-body { padding: 12px 16px; border-top: 1px solid var(--border); display: none; }
  .event-card-body.open { display: block; }

  /* מודל */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--surface); }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-body { padding: 1.25rem; }
  .modal-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; }
  .worker-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  .worker-row select { flex: 2; }
  .worker-row input { flex: 1; }
  .worker-row .status-sel { flex: 1.5; }

  @media (max-width: 600px) {
    .tabs { display: none; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 8px 0 12px; z-index: 50; }
    .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 0; color: var(--muted); font-size: 9px; border: none; background: none; }
    .bnav-item.active { color: var(--text); font-weight: 600; }
    .bnav-icon { font-size: 18px; }
    .topbar-user span { display: none; }
    .client-info { grid-template-columns: 1fr; }
  }
  @media (min-width: 601px) { .bottom-nav { display: none; } }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h1>💰 תזרים ושכר</h1>
    <p>כניסה מאובטחת לניהול העסק</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">כניסה</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">הרשמה</button>
    </div>
    <div class="field"><label>אימייל</label><input type="email" id="auth-email" placeholder="your@email.com" /></div>
    <div class="field"><label>סיסמה</label><input type="password" id="auth-password" placeholder="לפחות 6 תווים" /></div>
    <button class="btn-primary" id="auth-btn" onclick="doAuth()">כניסה</button>
    <div class="msg" id="auth-msg"></div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div class="topbar-title">💰 תזרים ושכר</div>
    <div class="topbar-user">
      <span id="user-email-display"></span>
      <button class="btn-logout" onclick="logout()">יציאה</button>
    </div>
  </div>

  <div class="main">
    <div class="month-bar">
      <label>חודש:</label>
      <select id="monthSel" onchange="updateMonth()"></select>
      <select id="yearSel" onchange="updateMonth()"></select>
    </div>

    <div class="cards">
      <div class="card"><div class="card-label">סה"כ הכנסות</div><div class="card-value c-green" id="d-income">—</div></div>
      <div class="card"><div class="card-label">סה"כ הוצאות</div><div class="card-value c-red" id="d-expense">—</div></div>
      <div class="card"><div class="card-label">שכר החודש</div><div class="card-value c-blue" id="d-salary">—</div></div>
      <div class="card"><div class="card-label">יתרה נטו</div><div class="card-value" id="d-net">—</div></div>
      <div style="background:var(--amber-bg);border:1px dashed var(--amber);border-radius:var(--radius);padding:0.75rem;display:flex;flex-direction:column;justify-content:center"><div style="font-size:11px;color:var(--amber);margin-bottom:4px">📋 צפי ממתין</div><div style="font-size:18px;font-weight:600;color:var(--amber)" id="d-pending">—</div><div style="font-size:10px;color:var(--amber);margin-top:3px;opacity:0.7">טרם שולם</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showPage('dashboard',this)">📊 סיכום</button>
      <button class="tab" onclick="showPage('transactions',this)">💸 הכנסות/הוצאות</button>
      <button class="tab" onclick="showPage('events',this)">🎯 אירועים</button>
      <button class="tab" onclick="showPage('employees',this)">👥 עובדים</button>
      <button class="tab" onclick="showPage('clients',this)">🤝 לקוחות</button>
      <button class="tab" onclick="showPage('alerts',this)">🔔 התראות</button>
    </div>

    <!-- סיכום -->
    <div id="page-dashboard" class="page active">
      <div class="section"><div class="section-title">הוצאות לפי קטגוריה</div><div id="cat-bars"><div class="empty">טוען...</div></div></div>
      <div class="section"><div class="section-title">סטטוס תשלום עובדים החודש</div><div id="emp-status"></div></div>
    </div>

    <!-- עסקאות -->
    <div id="page-transactions" class="page">
      <div class="section">
        <div class="section-title">הוסף רשומה</div>
        <div class="form-row">
          <input type="text" id="t-desc" placeholder="תיאור" />
          <input type="number" id="t-amount" placeholder="סכום ₪" min="0" />
          <select id="t-type"><option value="income">הכנסה</option><option value="expense">הוצאה</option></select>
          <select id="t-cat"><option>שירותים</option><option>שכירות</option><option>ציוד</option><option>שיווק</option><option>אחר</option></select>
        </div>
        <button class="btn-add" id="btn-add-tx" onclick="addTransaction()">+ הוסף</button>
      </div>
      <div class="section">
        <div class="section-title">רשומות החודש</div>
        <table><thead><tr><th>תיאור</th><th>קטגוריה</th><th>סוג</th><th>סכום</th><th></th></tr></thead>
        <tbody id="tx-table"></tbody></table>
      </div>
    </div>

    <!-- אירועים -->
    <div id="page-events" class="page">
      <div class="section" style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="section-title" style="margin-bottom:0">אירועים החודש</div>
          <div style="display:flex;gap:8px">
            <button class="btn-outline" onclick="loadGCal()">🔄 יומן גוגל</button>
            <button class="btn-add" onclick="openNewEventModal()">+ אירוע ידני</button>
          </div>
        </div>
        <div id="events-list"><div class="empty">לחץ על יומן גוגל לטעינה</div></div>
      </div>
    </div>

    <!-- עובדים -->
    <div id="page-employees" class="page">
      <div class="section">
        <div class="section-title">הוסף עובד חדש</div>
        <div class="form-row" style="grid-template-columns:1fr auto">
          <input type="text" id="e-name" placeholder="שם העובד" />
          <button class="btn-add" id="btn-add-emp" onclick="addEmployee()">+ הוסף</button>
        </div>
      </div>
      <div id="emp-cards" class="emp-cards"></div>
    </div>

    <!-- לקוחות -->
    <div id="page-clients" class="page">
      <div class="section">
        <div class="section-title">הוסף לקוח</div>
        <div class="form-row">
          <input type="text" id="c-name" placeholder="שם הלקוח" />
          <input type="tel" id="c-phone" placeholder="טלפון" />
          <input type="email" id="c-email" placeholder="אימייל" />
          <input type="text" id="c-bizid" placeholder="ח.פ / ע.מ" />
        </div>
        <button class="btn-add" id="btn-add-client" onclick="addClient()">+ הוסף לקוח</button>
      </div>
      <div id="clients-list"></div>
    </div>

    <!-- התראות -->
    <div id="page-alerts" class="page">
      <div id="alerts-box"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="bnav-item active" onclick="showPage('dashboard',this)" data-page="dashboard"><span class="bnav-icon">📊</span>סיכום</button>
    <button class="bnav-item" onclick="showPage('transactions',this)" data-page="transactions"><span class="bnav-icon">💸</span>הכנסות</button>
    <button class="bnav-item" onclick="showPage('events',this)" data-page="events"><span class="bnav-icon">🎯</span>אירועים</button>
    <button class="bnav-item" onclick="showPage('employees',this)" data-page="employees"><span class="bnav-icon">👥</span>עובדים</button>
    <button class="bnav-item" onclick="showPage('clients',this)" data-page="clients"><span class="bnav-icon">🤝</span>לקוחות</button>
    <button class="bnav-item" onclick="showPage('alerts',this)" data-page="alerts"><span class="bnav-icon">🔔</span>התראות</button>
  </div>
</div>

<!-- מודל אירוע -->
<div class="modal-overlay" id="event-modal" style="display:none" onclick="if(event.target===this)closeEventModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-event-title">פרטי אירוע</div>
      <button class="btn-del" onclick="closeEventModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>שם האירוע</label>
        <input type="text" id="modal-title-input" placeholder="שם האירוע" />
      </div>
      <div class="form-group">
        <label>תאריך</label>
        <input type="date" id="modal-date-input" />
      </div>
      <div class="form-group">
        <label>לקוח</label>
        <select id="modal-client"></select>
      </div>
      <div class="form-group">
        <label>מחיר ללקוח (₪)</label>
        <input type="number" id="modal-price" placeholder="0" min="0" />
      </div>
      <div class="form-group">
        <label>סטטוס תשלום לקוח</label>
        <select id="modal-status">
          <option value="ממתין">ממתין</option>
          <option value="שולם">שולם</option>
          <option value="באיחור">באיחור</option>
        </select>
      </div>
      <div class="form-group">
        <label>הערות</label>
        <textarea id="modal-notes" rows="2" placeholder="הערות..."></textarea>
      </div>
      <div class="form-group">
        <label>עובדים באירוע</label>
        <div id="modal-workers-list"></div>
        <button class="btn-outline" style="margin-top:8px;width:100%" onclick="addWorkerRow()">+ הוסף עובד</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeEventModal()">ביטול</button>
      <button class="btn-add" onclick="saveEvent()">שמור</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://zvrvlogqjzpnojfzbapu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2cnZsb2dxanpwbm9qZnpiYXB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjk2MjgsImV4cCI6MjA5NzgwNTYyOH0.2I45YWLkTDLjndmyoNImkPLfqOxJV7TVsff2kAOZHpg';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzH60EnHD5wqtRfYR1vv1-5oELqEK7RlcWqwHlvT88xQDfysYupYV3I8FbnsdRWfkNing/exec';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser=null, cachedTx=[], cachedEmps=[], cachedEmpEvents=[], cachedClients=[], cachedEventDetails=[], cachedEventWorkers=[], gcalEvents=[];
let modalWorkers=[], currentEditDetailId=null, isNewManualEvent=false;

const fmt = n => '₪' + Math.round(n).toLocaleString('he-IL');
const $ = id => document.getElementById(id);
const getMonth = () => $('yearSel').value + '-' + $('monthSel').value.padStart(2,'0');
const hebrewDays=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const hebrewMonths=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function initMonths() {
  const now=new Date(), names=hebrewMonths;
  const mSel=$('monthSel'); mSel.innerHTML='';

// LOAD
async function loadAll(){
  const month=getMonth(),uid=currentUser.id;
  const [txR,empR,evR,clientR,detailR,workerR]=await Promise.all([
    sb.from('transactions').select('*').eq('user_id',uid).eq('month',month).order('created_at',{ascending:false}),
    sb.from('employees').select('*').eq('user_id',uid).order('name'),
    sb.from('employee_events').select('*').eq('user_id',uid).eq('month',month),
    sb.from('clients').select('*').eq('user_id',uid).order('name'),
    sb.from('event_details').select('*').eq('user_id',uid),
    sb.from('event_workers').select('*')
  ]);
  cachedTx=txR.data||[];cachedEmps=empR.data||[];cachedEmpEvents=evR.data||[];
  cachedClients=clientR.data||[];cachedEventDetails=detailR.data||[];cachedEventWorkers=workerR.data||[];
  renderAll();
}

function renderAll(){
  const txIncome=cachedTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=cachedTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  // שכר עובדים: מאירועי עובדים + מאירועים כלליים של החודש
  const monthDetailIds=cachedEventDetails.filter(d=>(d.month===month||(d.event_date&&d.event_date.slice(0,7)===month))).map(d=>d.id);
  const eventWorkersSalary=cachedEventWorkers.filter(w=>monthDetailIds.includes(w.event_detail_id)).reduce((s,w)=>s+w.amount,0);
  const salary=cachedEmpEvents.reduce((s,e)=>s+e.amount,0) + eventWorkersSalary;
  // הכנסות מאירועים של החודש הנוכחי
  const month=getMonth();
  const eventIncome=cachedEventDetails.filter(d=>(d.month===month||(d.event_date&&d.event_date.slice(0,7)===month))&&d.price>0&&d.status==='שולם').reduce((s,d)=>s+(d.price||0),0);
  const pendingIncome=cachedEventDetails.filter(d=>(d.month===month||(d.event_date&&d.event_date.slice(0,7)===month))&&d.price>0&&d.status==='ממתין').reduce((s,d)=>s+(d.price||0),0);
  const income=txIncome+eventIncome;
  const net=income-expense-salary;
  $('d-income').textContent=fmt(income);$('d-expense').textContent=fmt(expense);$('d-salary').textContent=fmt(salary);$('d-pending').textContent=fmt(pendingIncome);
  const netEl=$('d-net');netEl.textContent=fmt(net);netEl.className='card-value '+(net>=0?'c-green':'c-red');
  renderCatBars(expense);renderEmpStatus();renderTxTable();renderEmpCards();renderClientsList();renderEventsList();renderAlerts(income,expense,salary,net);
}

function renderCatBars(totalExp){
  const cats={};cachedTx.filter(t=>t.type==='expense').forEach(t=>{cats[t.category]=(cats[t.category]||0)+t.amount;});
  const el=$('cat-bars');
  if(!Object.keys(cats).length){el.innerHTML='<div class="empty">אין הוצאות החודש</div>';return;}
  const colors={שכירות:'#185FA5',ציוד:'#0F6E56',שיווק:'#854F0B',שירותים:'#993C1D',אחר:'#533C89'};
  el.innerHTML=Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
    const pct=totalExp>0?Math.round(amt/totalExp*100):0;
    return `<div class="bar-wrap"><div class="bar-label"><span>${cat}</span><span>${fmt(amt)} (${pct}%)</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${colors[cat]||'#888'}"></div></div></div>`;
  }).join('');
}

function renderEmpStatus(){
  const el=$('emp-status');
  if(!cachedEmps.length){el.innerHTML='<div class="empty">לא נוספו עובדים</div>';return;}
  const month=getMonth();
  const monthDetailIds=cachedEventDetails.filter(d=>(d.month===month||(d.event_date&&d.event_date.slice(0,7)===month))).map(d=>d.id);
  el.innerHTML=cachedEmps.map(emp=>{
    const evs=cachedEmpEvents.filter(e=>e.employee_id===emp.id);
    const evWorkers=cachedEventWorkers.filter(w=>w.employee_id===emp.id&&monthDetailIds.includes(w.event_detail_id));
    const total=evs.reduce((s,e)=>s+e.amount,0)+evWorkers.reduce((s,w)=>s+w.amount,0);
    const allPaid=evs.length>0&&evs.every(e=>e.status==='שולם')&&evWorkers.every(w=>w.status==='שולם');
    const hasLate=evs.some(e=>e.status==='באיחור')||evWorkers.some(w=>w.status==='באיחור');
    const totalEvents=evs.length+evWorkers.length;
    const status=totalEvents===0?'אין אירועים':allPaid?'שולם':hasLate?'באיחור':'ממתין';
    const cls=status==='שולם'?'paid':status==='באיחור'?'late':status==='ממתין'?'pending':'';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
      <div><span style="font-size:13px;font-weight:500">${emp.name}</span>${total>0?`<span style="font-size:12px;color:var(--muted);margin-right:8px">${fmt(total)}</span>`:''}
      </div>${cls?`<span class="badge badge-${cls}">${status}</span>`:`<span style="font-size:12px;color:var(--muted)">${status}</span>`}
    </div>`;
  }).join('');
}

function renderAlerts(income,expense,salary,net){
  const alerts=[];
  const total_out=expense+salary;
  const lateEmpEvents=cachedEmpEvents.filter(e=>e.status==='באיחור');
  const lateClientEvents=cachedEventDetails.filter(d=>d.status==='באיחור');
  if(net<0) alerts.push({type:'danger',msg:`יתרה שלילית: ${fmt(net)}`});
  if(income>0&&total_out/income>0.85) alerts.push({type:'warn',msg:`ההוצאות מהוות ${Math.round(total_out/income*100)}% מההכנסות`});
  if(lateEmpEvents.length) alerts.push({type:'danger',msg:`${lateEmpEvents.length} תשלומים לעובדים באיחור`});
  if(lateClientEvents.length) alerts.push({type:'danger',msg:`${lateClientEvents.length} תשלומים מלקוחות באיחור`});
  const debtClients=cachedClients.filter(c=>{const evs=cachedEventDetails.filter(d=>d.client_id===c.id);const debt=evs.reduce((s,d)=>s+(d.price||0),0)-evs.filter(d=>d.status==='שולם').reduce((s,d)=>s+(d.price||0),0);return debt>0;});
  if(debtClients.length) alerts.push({type:'warn',msg:`${debtClients.length} לקוחות עם יתרה לתשלום: ${debtClients.map(c=>c.name).join(', ')}`});
  if(!alerts.length) alerts.push({type:'ok',msg:'הכל תקין ✓'});
  $('alerts-box').innerHTML=alerts.map(a=>`<div class="alert alert-${a.type}">${a.msg}</div>`).join('');
}

async function saveEvent(){

  const date=$('modal-date-input').value||new Date().toISOString().slice(0,10);
  const clientId=$('modal-client').value||null;
  const price=parseFloat($('modal-price').value)||0;
  const status=$('modal-status').value;
  const notes=$('modal-notes').value;
  const month=getMonth();

  let detailId=currentEditDetailId;
  if(detailId){
    await sb.from('event_details').update({event_title:title,event_date:date,client_id:clientId,price,status,notes}).eq('id',detailId);
  } else {
    const res=await sb.from('event_details').insert({user_id:uid,event_title:title,event_date:date,client_id:clientId,price,status,notes,month,is_manual:isNewManualEvent}).select();
    detailId=res.data?.[0]?.id;
  }

  if(detailId){
    await sb.from('event_workers').delete().eq('event_detail_id',detailId);
    const valid=modalWorkers.filter(w=>w.employee_id&&w.amount>0);
    if(valid.length) await sb.from('event_workers').insert(valid.map(w=>({event_detail_id:detailId,employee_id:w.employee_id,amount:w.amount,status:w.status||'ממתין'})));
  }

  closeEventModal();
  await loadAll();
  if(gcalEvents.length) renderEventsList();
}

async function deleteManualEvent(id){
  if(!id||!confirm('למחוק אירוע זה?'))return;
  await sb.from('event_workers').delete().eq('event_detail_id',id);
  await sb.from('event_details').delete().eq('id',id);
  await loadAll();
}

// פעולות
async function addTransaction(){
  const desc=$('t-desc').value.trim(),amount=parseFloat($('t-amount').value),type=$('t-type').value,category=$('t-cat').value;
  if(!desc||!amount||amount<=0)return;
  $('btn-add-tx').disabled=true;
  await sb.from('transactions').insert({user_id:currentUser.id,month:getMonth(),description:desc,amount,type,category});
  $('t-desc').value='';$('t-amount').value='';$('btn-add-tx').disabled=false;
  await loadAll();
}
async function deleteTx(id){if(!confirm('למחוק?'))return;await sb.from('transactions').delete().eq('id',id);await loadAll();}

async function addEmployee(){
  const name=$('e-name').value.trim();if(!name)return;
  $('btn-add-emp').disabled=true;
  await sb.from('employees').insert({user_id:currentUser.id,name});
  $('e-name').value='';$('btn-add-emp').disabled=false;
  await loadAll();
}
async function deleteEmp(id){if(!confirm('למחוק עובד?'))return;await sb.from('employee_events').delete().eq('employee_id',id);await sb.from('employees').delete().eq('id',id);await loadAll();}

async function addClient(){
  const name=$('c-name').value.trim(),phone=$('c-phone').value.trim(),email=$('c-email').value.trim(),business_id=$('c-bizid').value.trim();
  if(!name)return;
  $('btn-add-client').disabled=true;
  await sb.from('clients').insert({user_id:currentUser.id,name,phone,email,business_id});
  $('c-name').value='';$('c-phone').value='';$('c-email').value='';$('c-bizid').value='';
  $('btn-add-client').disabled=false;
  await loadAll();
}
async function deleteClient(id){if(!confirm('למחוק לקוח?'))return;await sb.from('clients').delete().eq('id',id);await loadAll();}

async function addEmpEvent(empId){
  const eventName=$('ev-event-'+empId).value.trim(),date=$('ev-date-'+empId).value,amount=parseFloat($('ev-amount-'+empId).value);
  if(!eventName||!amount||amount<=0){alert('נא למלא שם אירוע וסכום');return;}
  await sb.from('employee_events').insert({user_id:currentUser.id,employee_id:empId,event_name:eventName,date:date||null,amount,month:getMonth(),status:'ממתין'});
  $('ev-event-'+empId).value='';$('ev-date-'+empId).value='';$('ev-amount-'+empId).value='';
  await loadAll();
}
async function deleteEmpEvent(id){if(!confirm('למחוק?'))return;await sb.from('employee_events').delete().eq('id',id);await loadAll();}
async function updateEmpEventStatus(id,status){await sb.from('employee_events').update({status}).eq('id',id);await loadAll();}

function toggleCard(empId){const body=$('card-body-'+empId),icon=$('toggle-icon-'+empId);body.classList.toggle('collapsed');icon.textContent=body.classList.contains('collapsed')?'▶':'▼';}
function toggleEl(id){const el=$(id);if(el)el.classList.toggle('open');}

function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab,.bnav-item').forEach(t=>t.classList.remove('active'));
  const page=document.getElementById('page-'+id);
  if(page)page.classList.add('active');
  if(el)el.classList.add('active');
  document.querySelectorAll('[data-page="'+id+'"]').forEach(b=>b.classList.add('active'));
}

sb.auth.getSession().then(({data})=>{if(data.session)enterApp(data.session.user);});
</script>
