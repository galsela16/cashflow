<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ניהול תזרים ושכר</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#f0f4ff; --surface:#fff; --border:#dde3f0; --text:#1a1c2e; --muted:#8892b0;
  --green:#1b7f5e; --green-bg:#d6f5ea; --green-soft:#e8faf3;
  --red:#c0392b; --red-bg:#fde8e6; --red-soft:#fff0ef;
  --blue:#2563eb; --blue-bg:#dbeafe; --blue-soft:#eff6ff;
  --amber:#b45309; --amber-bg:#fef3c7;
  --radius:16px; --radius-sm:10px;
  --shadow:0 2px 12px rgba(37,99,235,.07);
  --shadow-md:0 4px 24px rgba(37,99,235,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}
#app-screen{background:linear-gradient(145deg,#3a6b8c 0%,#3a8a9a 30%,#3aaa98 60%,#42b08a 100%);min-height:100vh;position:relative}
#app-screen::before{content:'';position:fixed;inset:0;background:linear-gradient(145deg,rgba(220,235,245,.62) 0%,rgba(215,240,242,.58) 35%,rgba(218,245,238,.55) 65%,rgba(225,245,235,.6) 100%);pointer-events:none;z-index:0}
#app-screen .topbar{z-index:200}
#app-screen .main,#app-screen .bottom-nav{position:relative;z-index:1}
#app-screen .topbar{background:rgba(255,255,255,.7);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.5);box-shadow:0 4px 24px rgba(80,120,150,.1)}
#app-screen .topbar-title span:first-child{color:var(--text)}
#app-screen .topbar-title span:last-child{color:var(--blue)}
#app-screen .topbar-user{color:var(--muted)}
#app-screen .btn-logout{border-color:var(--border);color:var(--muted);background:rgba(255,255,255,.5)}
#app-screen .btn-logout:hover{border-color:var(--blue);color:var(--blue)}
#app-screen .bottom-nav{background:rgba(255,255,255,.8);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.5);box-shadow:0 -8px 32px rgba(80,120,150,.12)}
#app-screen .card{background:rgba(255,255,255,.97);box-shadow:0 16px 44px rgba(70,110,140,.2),0 4px 12px rgba(70,110,140,.1);transition:transform .25s cubic-bezier(.22,.61,.36,1),box-shadow .25s ease;will-change:transform}
#app-screen .card:hover{transform:translateY(-6px);box-shadow:0 26px 60px rgba(70,110,140,.28),0 8px 18px rgba(70,110,140,.14)}
#app-screen .section{background:rgba(255,255,255,.97);box-shadow:0 16px 44px rgba(70,110,140,.16),0 4px 12px rgba(70,110,140,.08)}
#app-screen .card-soft-green{background:rgba(232,250,243,.99)}
#app-screen .card-soft-blue{background:rgba(239,246,255,.99)}
#app-screen .card-soft-amber{background:rgba(254,243,199,.99)}
#app-screen .tabs .tab{background:rgba(255,255,255,.9);color:var(--muted);box-shadow:0 6px 20px rgba(70,110,140,.14);transition:transform .2s cubic-bezier(.22,.61,.36,1),box-shadow .2s ease;will-change:transform}
#app-screen .tabs .tab:hover{background:#fff;color:var(--blue);transform:translateY(-4px);box-shadow:0 10px 26px rgba(70,110,140,.2)}
#app-screen .tabs .tab.active{background:var(--blue);color:#fff;box-shadow:0 8px 26px rgba(37,99,235,.4)}
#app-screen .pill{background:rgba(255,255,255,.98);box-shadow:0 12px 32px rgba(70,110,140,.18),0 3px 8px rgba(70,110,140,.09);transition:transform .25s cubic-bezier(.22,.61,.36,1),box-shadow .25s ease;will-change:transform}
#app-screen .pill:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(70,110,140,.24)}
#app-screen .pill-amber{background:rgba(254,243,199,.99)}
#app-screen .pill-tax{background:rgba(255,240,239,.99)}
#app-screen .emp-card,#app-screen .client-card,#app-screen .event-card{box-shadow:0 16px 44px rgba(70,110,140,.16),0 4px 12px rgba(70,110,140,.08);transition:transform .25s cubic-bezier(.22,.61,.36,1),box-shadow .25s ease;will-change:transform}
#app-screen .emp-card:hover,#app-screen .client-card:hover,#app-screen .event-card:hover{transform:translateY(-5px);box-shadow:0 24px 56px rgba(70,110,140,.24)}
/* אנימציית כניסה — הכרטיסים "צפים" פנימה */
@keyframes floatIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
#app-screen .hero-balance,#app-screen .dash-group{animation:floatIn .5s ease backwards}
#app-screen .hero-balance{animation-delay:.05s}
#app-screen .dash-group:nth-of-type(1){animation-delay:.1s}
#app-screen .dash-group:nth-of-type(2){animation-delay:.15s}
#app-screen .dash-group:nth-of-type(3){animation-delay:.2s}
#app-screen .dash-group:nth-of-type(4){animation-delay:.25s}

/* AUTH */
#auth-screen{min-height:100vh;display:flex;align-items:stretch;background:#0f172a}
.auth-left{flex:1;display:none;flex-direction:column;justify-content:center;padding:3rem;background:linear-gradient(145deg,#1e3a8a,#1d4ed8,#2563eb);position:relative;overflow:hidden}
@media(min-width:800px){.auth-left{display:flex}}
.auth-left::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.auth-left-logo{font-size:36px;margin-bottom:1rem}
.auth-left-title{font-size:32px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:1rem}
.auth-left-title span{color:#93c5fd}
.auth-left-desc{font-size:15px;color:rgba(255,255,255,.75);line-height:1.7;margin-bottom:2rem}
.auth-features{display:flex;flex-direction:column;gap:12px}
.auth-feature{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.9);font-size:14px}
.auth-feature-icon{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.auth-right{display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;flex:1;background:#fff}
.auth-card{width:100%;max-width:400px}
.auth-card-logo{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem}
.auth-card-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#1d4ed8,#2563eb);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.auth-card-logo-text{font-size:20px;font-weight:700;color:var(--text)}
.auth-card-logo-text span{color:var(--blue)}
.auth-heading{font-size:24px;font-weight:700;color:var(--text);margin-bottom:.35rem}
.auth-subheading{color:var(--muted);font-size:14px;margin-bottom:1.75rem}
.auth-tabs{display:flex;margin-bottom:1.5rem;background:var(--bg);border-radius:var(--radius-sm);padding:4px;gap:4px}
.auth-tab{flex:1;padding:8px;background:transparent;border:none;cursor:pointer;font-size:14px;color:var(--muted);border-radius:8px;transition:all .2s}
.auth-tab.active{background:#fff;color:var(--blue);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px;letter-spacing:.3px}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:#fff;color:var(--text);transition:border-color .15s,box-shadow .15s}
.field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border:none;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(37,99,235,.3);transition:opacity .15s,transform .1s}
.btn-primary:hover{opacity:.93;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;transform:none}
.auth-divider{display:flex;align-items:center;gap:10px;margin:1rem 0;color:var(--muted);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-trust{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:1.25rem;font-size:12px;color:var(--muted)}
.auth-trust-icon{color:#10b981}
.msg{margin-top:12px;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;display:none}
.msg.ok{background:var(--green-bg);color:var(--green);display:block}
.msg.err{background:var(--red-bg);color:var(--red);display:block}

/* APP */
#app-screen{display:none}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(37,99,235,.06)}
.topbar-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.topbar-user{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:10px}
.btn-logout{padding:6px 14px;border:1.5px solid var(--border);border-radius:100px;background:transparent;cursor:pointer;font-size:13px;color:var(--muted)}

/* settings dropdown */
.settings-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:rgba(255,255,255,.6);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.settings-btn:hover{border-color:var(--blue);background:#fff;transform:rotate(30deg)}
.settings-menu{position:fixed;width:240px;background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.18);padding:8px;z-index:300;display:none;animation:settingsIn .15s ease}
.settings-wrap{position:relative}
.settings-menu.open{display:block}
@keyframes settingsIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.settings-account{display:flex;align-items:center;gap:10px;padding:10px 10px 12px}
.settings-account-icon{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1e3a5f,#2563eb);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.settings-account-info{min-width:0}
.settings-account-label{font-size:11px;color:var(--muted)}
.settings-account-email{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.settings-divider{height:1px;background:var(--border);margin:4px 0}
.settings-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--text);text-align:right;transition:background .12s}
.settings-item:hover{background:var(--bg)}
.settings-item span{font-size:16px;width:20px;text-align:center}
.settings-item-danger{color:var(--red)}
.settings-item-danger:hover{background:var(--red-soft)}
.settings-section{padding:14px 0;border-bottom:1px solid var(--border)}
.settings-section:last-of-type{border-bottom:none}
.settings-section-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text)}
.settings-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text)}
.main{max-width:800px;margin:0 auto;padding:1.25rem 1rem 5rem}
.month-bar{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.month-bar label{font-size:13px;color:var(--text);font-weight:500}
.month-bar select{padding:7px 10px;border:1px solid rgba(255,255,255,.6);border-radius:var(--radius-sm);background:rgba(255,255,255,.7);color:var(--text);font-size:14px;backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(80,120,150,.08)}
.month-bar select option{background:#fff;color:var(--text)}

/* summary pills */
.summary-pills{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.pill{background:var(--surface);border-radius:100px;padding:8px 16
